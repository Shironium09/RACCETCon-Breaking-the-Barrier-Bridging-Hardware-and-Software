<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RACCETCon Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <header class="header">
      <div class="logo">raccetcon</div>
      <h1>/ dashboard</h1>
      <div class="status" id="status">idle</div>
      <button id="unlockAudioBtn" style="background:#4a9;color:white;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:0.7rem;margin-left:10px;">Enable Audio</button>
    </header>

    <div class="main-content">
      <div class="board" id="board">
        <div class="board-placeholder" id="placeholder">awaiting input</div>
        <img class="board-image" id="boardImage" />
      </div>

      <div class="log-panel">
        <div class="log-header">
          <span>log</span>
          <span class="log-count" id="logCount">0</span>
        </div>
        <div class="log-list" id="logList">
          <div class="log-empty" id="logEmpty">no events yet</div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
